# Strimzi Kafka in KRaft mode — 3 brokers, sized for ~50 MB/s ingest.
# Install the Strimzi operator first:
#   kubectl create namespace kafka
#   kubectl apply -f 'https://strimzi.io/install/latest?namespace=kafka' -n kafka
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: broker
  namespace: kafka
  labels:
    strimzi.io/cluster: sfi-bench
spec:
  replicas: 3
  roles: [controller, broker]
  storage:
    type: persistent-claim
    size: 200Gi
    class: gp3
    deleteClaim: true
  resources:
    requests: { cpu: "2", memory: 8Gi }
    limits:   { cpu: "4", memory: 8Gi }
---
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: sfi-bench
  namespace: kafka
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 4.2.0
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      default.replication.factor: 3
      min.insync.replicas: 2
      num.partitions: __PARTITIONS__
  entityOperator:
    topicOperator: {}
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: events
  namespace: kafka
  labels:
    strimzi.io/cluster: sfi-bench
spec:
  partitions: __PARTITIONS__
  replicas: 3
  config:
    # short retention so a 50+ MB/s benchmark stream can't fill broker disk
    retention.ms: "600000"
    retention.bytes: "2147483648"
    segment.ms: "60000"
    compression.type: "producer"
