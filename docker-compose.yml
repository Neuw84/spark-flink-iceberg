# ─────────────────────────────────────────────────────────────
# Fully self-sufficient local benchmark stack — 100% open source.
#   Redpanda        Kafka-compatible broker (source)
#   MinIO           S3-compatible object store (Iceberg warehouse)
#   iceberg-rest    Iceberg REST catalog (shared by Spark + Flink)
#   flink-*         Flink 2.2 JobManager + TaskManager
#   spark           Spark 4.1 (submit target)
#
# Nothing here talks to AWS. The EKS variant (see eks/) swaps MinIO
# for S3 and the REST catalog for Glue.
# ─────────────────────────────────────────────────────────────
x-common-env: &common-env
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-admin}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-password}
  AWS_REGION: ${AWS_REGION:-us-east-1}

services:
  # Apache Kafka 4.1 in KRaft mode (single node = broker + controller). Same
  # distribution Strimzi runs on EKS, so jobs are wire-identical local↔cloud.
  # Two listeners: kafka:9092 (containers) and localhost:29092 (host producer).
  kafka:
    container_name: kafka
    hostname: kafka
    image: ${KAFKA_IMAGE:-apache/kafka:4.1.0}
    ports:
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,HOST://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: ${KAFKA_PARTITIONS:-12}
      # Aggressive default retention so a 50 MB/s benchmark stream can't fill the
      # host disk: 2-min time cap + 512 MB/partition + 30s segments (purge fast).
      KAFKA_LOG_RETENTION_MS: "120000"
      KAFKA_LOG_RETENTION_BYTES: "536870912"
      KAFKA_LOG_SEGMENT_BYTES: "268435456"
      KAFKA_LOG_ROLL_MS: "30000"
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: "15000"
      KAFKA_HEAP_OPTS: "-Xmx1g -Xms1g"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  minio:
    container_name: minio
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-admin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-password}
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  # Create the warehouse bucket once MinIO is up.
  minio-init:
    image: minio/mc:RELEASE.2024-11-05T11-29-45Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${AWS_ACCESS_KEY_ID:-admin} ${AWS_SECRET_ACCESS_KEY:-password};
      mc mb -p local/${WAREHOUSE_BUCKET:-warehouse};
      mc anonymous set public local/${WAREHOUSE_BUCKET:-warehouse};
      echo 'bucket ready';
      "

  iceberg-rest:
    container_name: iceberg-rest
    # REST protocol is version-compatible; the fixture image lags the client
    # jars (1.11.0 on Maven) so we pin the latest published server image.
    image: apache/iceberg-rest-fixture:1.10.1
    depends_on:
      minio:
        condition: service_healthy
    environment:
      <<: *common-env
      CATALOG_WAREHOUSE: s3://${WAREHOUSE_BUCKET:-warehouse}/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
    ports:
      - "8181:8181"

  flink-jobmanager:
    container_name: flink-jobmanager
    build:
      context: ./flink
      dockerfile: Dockerfile
      args:
        FLINK_VERSION: ${FLINK_VERSION:-2.2.0}
        ICEBERG_VERSION: ${ICEBERG_VERSION:-1.11.0}
    command: jobmanager
    depends_on:
      kafka:
        condition: service_healthy
      iceberg-rest:
        condition: service_started
    environment:
      <<: *common-env
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        state.backend: rocksdb
        state.checkpoints.dir: s3://${WAREHOUSE_BUCKET:-warehouse}/checkpoints
        execution.checkpointing.interval: ${CHECKPOINT_INTERVAL_MS:-30000}
        s3.endpoint: http://minio:9000
        s3.path.style.access: true
    ports:
      - "8081:8081"

  flink-taskmanager:
    build:
      context: ./flink
      dockerfile: Dockerfile
      args:
        FLINK_VERSION: ${FLINK_VERSION:-2.2.0}
        ICEBERG_VERSION: ${ICEBERG_VERSION:-1.11.0}
    command: taskmanager
    depends_on:
      - flink-jobmanager
    environment:
      <<: *common-env
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: ${FLINK_TM_SLOTS:-7}
        taskmanager.memory.process.size: ${FLINK_TM_MEM:-14336m}
        state.backend: rocksdb
        s3.endpoint: http://minio:9000
        s3.path.style.access: true
    deploy:
      replicas: ${FLINK_TASKMANAGERS:-1}

  spark:
    container_name: spark
    build:
      context: ./spark
      dockerfile: Dockerfile
      args:
        SPARK_VERSION: ${SPARK_VERSION:-4.1.2}
        ICEBERG_VERSION: ${ICEBERG_VERSION:-1.11.0}
    depends_on:
      kafka:
        condition: service_healthy
      iceberg-rest:
        condition: service_started
    environment:
      <<: *common-env
    # Kept alive so bench scripts can spark-submit into it.
    command: ["tail", "-f", "/dev/null"]
    ports:
      - "4040:4040"

networks:
  default:
    name: sfi-bench
